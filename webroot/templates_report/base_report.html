<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Report{% endblock %}</title>
    <style>
        /* Include common styles */
        {% include 'css/report.css' %}
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="header">
        <div class="farm-name">{{ farm_info.name }}</div>
        <div class="report-title">{% block report_title %}{% endblock %}</div>
        <div class="generated-date">Generated on: {{ generated_date.strftime('%B %d, %Y at %H:%M') }}</div>
    </div>

    {% block content %}{% endblock %}

    <div class="footer">
        Report generated by Pig Operations Management System
    </div>
</body>
</html>
