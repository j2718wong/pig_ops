{% extends "index.html" %}


{% block content %}

<div style="padding-left:0.5rem;">
	
	<div class="">
      <div><h2>Sow / Boar</h2></div>
    
      <ul class="nav nav-tabs" id="tab-prod-list" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="btn-sow-boar-sow" 	data-bs-toggle="tab" data-bs-target="#tab-sow-boar-sow" type="button" role="tab" aria-controls="tab-sow-boar-sow" aria-selected="false">Sow List</button>
        </li>
        
		<li class="nav-item" role="presentation">
          <button class="nav-link" id="btn-sow-boar-boar" 		data-bs-toggle="tab" data-bs-target="#tab-sow-boar-boar" type="button" role="tab" aria-controls="tab-sow-boar-boar" aria-selected="false">Boar List</button>
        </li>
		
		<li class="nav-item" role="presentation">
          <button class="nav-link" id="btn-sow-boar-gilt" 		data-bs-toggle="tab" data-bs-target="#tab-sow-boar-gilt" type="button" role="tab" aria-controls="tab-sow-boar-gilt" aria-selected="false">Gilt List</button>
        </li>
        
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="btn-sow-boar-junior" 	data-bs-toggle="tab" data-bs-target="#tab-sow-boar-junior" type="button" role="tab" aria-controls="tab-sow-boar-junior" aria-selected="false">Junior Boar List</button>
        </li>
        
      </ul>

      <div class="tab-content " id="myTabContent">

        <div class="tab-pane fade show active" id="tab-sow-boar-sow" style= "min-height:400px;" role="tabpanel" aria-labelledby="btn-sow-boar-sow">
          <div id = "div-sow">
            <div id = "div-top-sow"></div>
            <div id = "div-list-sow" class ="auto-table"></div>
          </div>

        </div>
        
        
        <div class="tab-pane fade" id="tab-sow-boar-boar" role="tabpanel" aria-labelledby="btn-sow-boar-boar">
          <div id = "div-boar" class = "">
            <div id = "div-top-boar"></div>
            <div id = "div-list-boar" class ="auto-table "></div>
          </div>
          
        </div>
        
		
		<div class="tab-pane fade" id="tab-sow-boar-gilt" role="tabpanel" aria-labelledby="btn-sow-boar-gilt">
          <div id = "div-gilt" class = "">
            <div id = "div-top-gilt"></div>
            <div id = "div-list-gilt" class ="auto-table "></div>
          </div>
          
        </div>
		
		
		<div class="tab-pane fade" id="tab-sow-boar-junior" role="tabpanel" aria-labelledby="btn-sow-boar-junior">
          <div id = "div-gilt" class = "">
            <div id = "div-top-junior"></div>
            <div id = "div-list-junior" class ="auto-table "></div>
          </div>
          
        </div>
		
        
      </div>

	</div>
    
	
	<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
      <symbol id="check-circle-fill" fill="currentColor" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
      </symbol>
      <symbol id="info-fill" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
      </symbol>
      <symbol id="exclamation-triangle-fill" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
      </symbol>
    </svg>
	
	<!-- Modal -->
	<div id="div-container-add-entry-sow-boar"> </div>
	
	
	<!-- Modal -->
	<div id="div-dispose-entry-sow-boar" class="modal fade" role="dialog">
	  <div class="modal-dialog">
		<div class="modal-content">
		  <div class="modal-header">
			<h1 class="modal-title fs-5" id="label-dispose-sow-boar">Dispose Sow Entry</h1>
			<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			
			
		  </div>
		  <div class="modal-body">
			<div class="mb-3">
				<label for="txt-dispose-entry-sow-boar-number" class="form-label" data-toggle="tooltip" data-placement="top" style="min-width:120px;" title="This can be a sow eartag number.">Sow Number:</label>
				<b><span id="txt-dispose-entry-sow-boar-number"> </span></b>
			</div>
			
			<div class="mb-3">
				<label for="txt-dispose-entry-sow-boar-name" class="form-label" data-toggle="tooltip" data-placement="top" style="min-width:120px;" title="Friendly name to easily reference your sow.">Sow Name:</label>
				<b><span id="txt-dispose-entry-sow-boar-name" > </span></b>
			</div>
			
			<div class="mb-3">
				<label for="txt-dispose-entry-date-dispose" class="form-label" data-toggle="tooltip" data-placement="top" title="Date Disposed">Date Disposed</label>
				<input type="text" class="form-control" id="txt-dispose-entry-date-dispose" placeholder="">
			</div>
			
			<div class="mb-3">
				<label for="sel-dispose-entry-dispose-status" class="form-label" data-toggle="tooltip" data-placement="top" title="Dispose Status">Dispose Status</label>
				<select class="form-select" aria-label="Default select example" id = "sel-dispose-entry-dispose-status">
				  <option selected>Select Dispose Status</option>
				  <option value="1">Sold</option>
				  <option value="2">Culled</option>
				  <option value="3">Died</option>
				  <option value="3">Other</option>
				</select>
			</div>
			
			<div class="mb-3">
				<label for="txt-dispose-entry-notes" class="form-label" data-toggle="tooltip" data-placement="top" title="Comments">Notes</label>
				<textarea class="form-control" rows="2" id="txt-dispose-entry-notes"></textarea>
			</div>
			
		  </div>
		  
		  <div class="modal-footer">
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
			<button type="button" class="btn btn-primary" onclick="gPageSow.sowBoarTable.onClickDisposeSowEntry();" >Dispose</button>
		  </div>
		</div>
	  </div>
	</div>
	
	
	<!-- Modal -->
	<div id="div-add-entry-notes" class="modal fade" role="dialog">
	  <div class="modal-dialog">
		<div class="modal-content">
		  <div class="modal-header">
			<h1 class="modal-title fs-5" id="hdr-add-entry-notes">New Sow Entry</h1>
			<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
		  </div>
		  <div class="modal-body">
			
			<div class="mb-3">
				<label for="txt-add-entry-notes-date-notes" class="form-label" data-toggle="tooltip" data-placement="top" title="Date of birth">Date Notes</label>
				<input type="text" class="form-control" id="txt-add-entry-notes-date-notes" placeholder="">
			</div>
			
			<div class="mb-3">
				<label for="txt-add-entry-notes-notes" class="form-label" data-toggle="tooltip" data-placement="top" title="Comments">Notes</label>
				<textarea class="form-control" rows="2" id="txt-add-entry-notes-notes"></textarea>
			</div>
			
			
		  </div>
		  
		  <div class="modal-footer">
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
			<button type="button" class="btn btn-primary" onclick="gPageSow.sowBoarTable.onClickSaveNewNotesEntry();" >Save</button>
		  </div>
		</div>
	  </div>
	</div>
	
	
	
	
	<script type="text/javascript">
	$(document).ready(function(){
		var PAGE_DATA = {{page_data}};

		gPageSowBoar.setPageData(PAGE_DATA);
	});
	</script>

	
</div>


{% endblock %}
