<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="canonical" href="https://superpig.jsysdev.com" />
    
    <meta name="robots" content="noindex, nofollow" />
    
    <meta name="application-name" content="Superpig">
    <meta name="apple-mobile-web-app-title" content="Superpig">
    
    <title>SuperPig - Maintenance</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Maintenance card */
        .maintenance-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #eef2f6;
        }

        /* Icon / Logo section */
        .icon-section {
            margin-bottom: 24px;
        }

        .pig-icon {
            font-size: 72px;
            display: inline-block;
            animation: gentleBounce 2s infinite ease-in-out;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Logo row */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .company-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #1877F2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .product-name {
            font-size: 24px;
            font-weight: 700;
            color: #1e3a8a;
            letter-spacing: -0.3px;
        }

        /* Title */
        .title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }

        /* Message */
        .message {
            font-size: 15px;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* Progress bar */
        .progress-container {
            background: #e2e8f0;
            border-radius: 30px;
            height: 6px;
            width: 100%;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-bar {
            background: #1877F2;
            width: 60%;
            height: 100%;
            border-radius: 30px;
            animation: progress 2s infinite ease-in-out;
        }

        @keyframes progress {
            0% { width: 20%; }
            50% { width: 70%; }
            100% { width: 20%; }
        }

        /* Refresh button */
        .refresh-btn {
            background: #1877F2;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            width: 100%;
        }

        .refresh-btn:active {
            background: #0d5cb6;
            transform: scale(0.97);
        }

        /* Auto-refresh text */
        .auto-refresh {
            font-size: 12px;
            color: #94a3b8;
        }

        .auto-refresh span {
            font-weight: 600;
            color: #1877F2;
        }

        /* Footer links */
        .footer-links {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eef2f6;
            font-size: 12px;
            color: #94a3b8;
        }

        .footer-links a {
            color: #1877F2;
            text-decoration: none;
        }

        .footer-links a:active {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="maintenance-card">
    <!-- Icon -->
    <div class="icon-section">
        <div class="pig-icon">🐷🔧</div>
    </div>

    <!-- Logo -->
    <div class="logo-row">
        <div class="company-logo">J</div>
        <div class="product-name">SuperPig</div>
    </div>

    <!-- Title -->
    <div class="title">
        We're updating SuperPig
    </div>

    <!-- Message -->
    <div class="message">
        We're making improvements to serve you better.<br>
        This usually takes just a few seconds.
    </div>

    <!-- Progress bar -->
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <!-- Refresh button -->
    <button class="refresh-btn" onclick="location.reload()">
        🔄 Try Again
    </button>

    <!-- Auto-refresh info -->
    <div class="auto-refresh">
        Page will auto-refresh in <span id="countdown">30</span> seconds
    </div>

    <!-- Footer -->
    <div class="footer-links">
        <a href="https://superpig.jsysdev.com">superpig.jsysdev.com</a>
    </div>
</div>

<script>
    // Auto-refresh countdown
    let seconds = 30;
    const countdownEl = document.getElementById('countdown');
    
    const timer = setInterval(function() {
        seconds--;
        if (countdownEl) {
            countdownEl.textContent = seconds;
        }
        if (seconds <= 0) {
            clearInterval(timer);
            location.reload();
        }
    }, 1000);
</script>

</body>
</html>
