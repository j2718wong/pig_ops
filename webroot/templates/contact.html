<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="content-type"   content="text/html; charset=utf-8"/>    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://superpig.jsysdev.com" />
  
    <meta name="robots" content="index, follow" />
    
    <title>SuperPig - Contact Us</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐷</text></svg>">
  
    <link rel="manifest" href="/manifest.json?v={{ page_data.app_version }}">
    <link rel="apple-touch-icon" href="/static_m/images/logo/superpig_192_192.png">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SuperPig">
    
    <script>
        const APP_VERSION = '{{ page_data.app_version }}'; 
        window.APP_VERSION =  APP_VERSION;
    </script>
    
    <script src="/static_m/js/pwa-handler.js" defer></script>
  
    <link type="text/css" rel="stylesheet" href="/static_m/css/all.min.css"/>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            margin: 0;
        }

        /* Contact card container */
        .contact-card {
            max-width: 360px;
            background: white;
            padding: 55px 20px 32px 20px;
            margin: 0 auto;
            position: relative;
        }

        /* Product & Logo section */
        .product-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #1877F2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            line-height: 1;
            padding-bottom: 4px;
        }

        .product-name {
            font-size: 24px;
            font-weight: 700;
            color: #1e3a8a;
            letter-spacing: -0.3px;
        }

        /* Contact info section */
        .contact-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .contact-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 24px;
        }

        .contact-method {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px 16px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid #e9ecef;
        }

        .contact-icon {
            font-size: 32px;
            color: #1877F2;
            margin-bottom: 12px;
        }

        .contact-label {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .contact-value {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
            word-break: break-all;
        }

        .contact-value a {
            color: #1e3a8a;
            text-decoration: none;
        }

        .contact-value a:hover {
            text-decoration: underline;
        }

        /* Facebook button */
        .mobile-fb-like {
            margin-bottom: 16px;
        }

        .mobile-fb-like a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #1877F2;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .mobile-fb-like a:hover {
            background: #1663c6;
        }

        .divider {
            height: 1px;
            background: #e9ecef;
            margin: 24px 0;
        }

        .response-time {
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            margin-top: 16px;
        }

        /* Footer styles */
        .footer-border {
            width: 100%;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            border-top: 1px solid #e9eef4;
        }

        .legal-footer {
            max-width: 360px;
            margin: 0 auto;
            padding: 20px 24px 24px;
            text-align: center;
            font-size: 13px;
            color: #8d99ae;
        }

        .website-link {
            margin-bottom: 16px;
            padding: 10px 12px;
            background-color: #f5f8ff;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #e9eef4;
        }

        .website-link a {
            color: #1877F2;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }

        .website-link a:hover {
            text-decoration: underline;
        }

        .footer-links {
            margin-bottom: 8px;
        }

        .footer-links a {
            color: #5e6879;
            text-decoration: none;
            margin: 0 6px;
        }

        .footer-links a:hover {
            color: #1877F2;
        }

        .dot {
            color: #ccd4e0;
            font-size: 12px;
        }

        .copyright {
            color: #a6b1c2;
            font-size: 12px;
        }

        @media (max-width: 380px) {
            .contact-card {
                padding: 32px 16px;
            }
            .product-name {
                font-size: 20px;
            }
            .company-logo {
                width: 40px;
                height: 40px;
                font-size: 36px;
            }
        }
    </style>
</head>

<body>

<div class="contact-card">
    <!-- Logo and Product Name -->
    <div class="product-row">
        <div class="company-logo">J</div>
        <div class="product-name">SuperPig</div>
    </div>

    <!-- Contact Section -->
    <div class="contact-section">
        <div class="contact-title">Contact Us</div>

        <!-- Facebook Button -->
        <div class="mobile-fb-like">
            <a href="https://www.facebook.com/superpig.jsysdev" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-facebook" style="font-size: 18px;"></i>
                <span>Like us on Facebook</span>
            </a>
        </div>

        <!-- Email -->
        <div class="contact-method">
            <div class="contact-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="contact-label">Email</div>
            <div class="contact-value">
                <a href="mailto:contact@jsysdev.com">contact@jsysdev.com</a>
            </div>
        </div>

        <!-- WhatsApp -->
        <div class="contact-method">
            <div class="contact-icon">
                <i class="fab fa-whatsapp"></i>
            </div>
            <div class="contact-label">WhatsApp</div>
            <div class="contact-value">
                <a href="https://wa.me/85260615575" target="_blank">+852 6061 5575</a>
            </div>
        </div>

        <div class="response-time">
            <i class="far fa-clock"></i> We typically respond within 24 hours
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer-border">
    <div class="legal-footer">
        <div class="website-link">
            <i class="fas fa-globe"></i>
            <a href="https://superpig.jsysdev.com" target="_blank" rel="noopener noreferrer">superpig.jsysdev.com</a>
        </div>
        
        <div class="footer-links">
            <a href="/terms">Terms</a>
            <span class="dot">•</span>
            <a href="/privacy">Privacy</a>
            <span class="dot">•</span>
            <a href="/contact">Contact</a>
        </div>

        <div class="copyright">
            © <span id="copyright-year">2026</span> J SysDev. All rights reserved.
        </div>
    </div>
</div>

<script type="text/javascript">
    document.getElementById('copyright-year').textContent = new Date().getFullYear();
</script>

</body>
</html>
