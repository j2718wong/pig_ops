# bitbucket-pipelines.yml for pig_ops backend
image: atlassian/default-image:3

pipelines:
  branches:
    main:
      - step:
          name: 🚀 Deploy Backend to Production
          deployment: production
          script:
            # Install SSH client if not present
            - apt-get update && apt-get install -y openssh-client
            
            # Setup SSH directory
            - mkdir -p ~/.ssh
            - chmod 700 ~/.ssh
            
            # Add server to known hosts
            - ssh-keyscan -H $DIGITAL_OCEAN_SERVER_IP >> ~/.ssh/known_hosts
            - chmod 644 ~/.ssh/known_hosts
            
            # Decode the SSH private key (base64 encoded in repository variables)
            - echo "$DIGITAL_OCEAN_DEPLOY_KEY" | base64 -d > ~/.ssh/id_rsa
            - chmod 600 ~/.ssh/id_rsa
            
            # Test SSH connection (optional)
            - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $DIGITAL_OCEAN_SERVER_USER@$DIGITAL_OCEAN_SERVER_IP "echo '✅ SSH connection successful'"
            
            # Ensure deploy.sh exists and is executable
            - ssh -i ~/.ssh/id_rsa $DIGITAL_OCEAN_SERVER_USER@$DIGITAL_OCEAN_SERVER_IP "chmod +x /root/projects/jsys/deploy.sh"
            
            # Run the deployment script
            - ssh -i ~/.ssh/id_rsa $DIGITAL_OCEAN_SERVER_USER@$DIGITAL_OCEAN_SERVER_IP "cd /root/projects/jsys && ./deploy.sh"
            
            # Optional: Check app status after deployment
            - ssh -i ~/.ssh/id_rsa $DIGITAL_OCEAN_SERVER_USER@$DIGITAL_OCEAN_SERVER_IP "ps aux | grep python"
